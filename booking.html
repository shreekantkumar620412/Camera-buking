<div class="form-box">

<h1>

Booking Form

</h1>

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Enter Name"
required>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
required>

<select id="eventType">

<option>
Wedding
</option>

<option>
Birthday
</option>

<option>
Drone Shoot
</option>

</select>

<input
type="date"
id="date"
required>

<textarea
id="details"
placeholder="Event Details">
</textarea>

<button type="submit">

Book Now

</button>

</form>

</div>

<button
class="theme-btn"
onclick="toggleTheme()"
>

🌙

</button>
