<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<section class="login-page">

<div class="login-box">

<h1>Admin Login</h1>

<form id="loginForm">

<input type="text"
id="username"
placeholder="Username"
required>

<input type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
